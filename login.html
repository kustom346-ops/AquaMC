<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AquaMC — Вход</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="grid-bg"></div>
  <div id="particles" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></div>
  <nav id="navbar" class="navbar"></nav>

  <div class="container">
    <div class="form-card">
      <h1 class="page-title" style="font-size:1.8rem; margin-bottom:1.8rem;">ВХОД</h1>
      <form id="loginForm">
        <div class="form-group">
          <label>Имя пользователя</label>
          <input type="text" id="loginUser" required>
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="loginPass" required>
        </div>
        <button type="submit" class="btn" style="width:100%;">ВОЙТИ</button>
      </form>
      <div class="form-footer">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/particles.js"></script>
  <script>
    initNavbar();

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value.trim();

      if (!username || !password) {
        showToast('Заполните все поля');
        return;
      }

      const success = loginUser(username, password);
      if (success) {
        showToast('Вход выполнен');
        setTimeout(() => window.location.href = 'index.html', 600);
      }
    });
  </script>
</body>
</html>
